<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TzEL Spec</title>
  <meta name="description" content="Rendered protocol specification for TzEL.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0c1117;
      --bg-deep: #090d12;
      --surface: rgba(17, 25, 36, 0.82);
      --surface-soft: rgba(17, 25, 36, 0.58);
      --line: rgba(173, 197, 255, 0.12);
      --line-strong: rgba(173, 197, 255, 0.24);
      --text: #f7fbff;
      --muted: #9aa8bb;
      --blue: #0d61ff;
      --blue-light: #54a1ff;
      --teal: #24d0c4;
      --gradient: linear-gradient(135deg, #0d61ff 0%, #24d0c4 100%);
      --radius: 18px;
      --radius-sm: 12px;
      --radius-pill: 999px;
      --font: "IBM Plex Sans", sans-serif;
      --display: "Space Grotesk", sans-serif;
      --mono: "JetBrains Mono", monospace;
      --max-width: 1280px;
      --shadow: 0 28px 90px rgba(0, 0, 0, 0.34);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: var(--font);
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(13, 97, 255, 0.15), transparent 30%),
        radial-gradient(circle at 82% 10%, rgba(36, 208, 196, 0.11), transparent 24%),
        linear-gradient(180deg, #101822 0%, var(--bg) 28%, var(--bg-deep) 100%);
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 72px 72px;
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.38), transparent 88%);
      opacity: 0.18;
    }

    a { color: inherit; }
    code, pre { font-family: var(--mono); }

    .wrap {
      width: min(calc(100% - 48px), var(--max-width));
      margin: 0 auto;
    }

    nav {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(8, 12, 18, 0.78);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .nav-inner {
      width: min(calc(100% - 48px), var(--max-width));
      margin: 0 auto;
      padding: 18px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      font-family: var(--display);
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .logo-icon,
    .logo-icon svg {
      width: 32px;
      height: 32px;
      display: block;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 26px;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--muted);
      font-size: 0.92rem;
      font-weight: 500;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: var(--text);
    }

    .layout {
      display: grid;
      grid-template-columns: 250px minmax(0, 1fr);
      gap: 28px;
      align-items: start;
      padding: 56px 0 80px;
    }

    .toc {
      position: sticky;
      top: 92px;
      padding: 20px;
      border-radius: var(--radius);
      background: var(--surface-soft);
      border: 1px solid var(--line);
      max-height: calc(100vh - 120px);
      overflow: auto;
    }

    .toc-title {
      margin: 0 0 14px;
      font-size: 0.84rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #bfd8ff;
    }

    .toc ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 8px;
    }

    .toc ul ul {
      padding-left: 14px;
      margin-top: 6px;
      gap: 6px;
    }

    .toc a {
      text-decoration: none;
      color: var(--muted);
      font-size: 0.94rem;
      display: block;
    }

    .toc a:hover {
      color: var(--text);
    }

    .article-shell {
      min-width: 0;
      padding: 34px 38px;
      border-radius: 26px;
      background: var(--surface);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    .markdown h1,
    .markdown h2,
    .markdown h3 {
      font-family: var(--display);
      letter-spacing: -0.03em;
      line-height: 1.12;
      scroll-margin-top: 100px;
    }

    .markdown h1 {
      margin: 0 0 16px;
      font-size: clamp(2rem, 4vw, 3rem);
    }

    .markdown h2 {
      margin: 42px 0 16px;
      font-size: 1.6rem;
    }

    .markdown h3 {
      margin: 28px 0 12px;
      font-size: 1.18rem;
    }

    .markdown p,
    .markdown li,
    .markdown blockquote {
      color: #dce6f5;
    }

    .markdown p,
    .markdown ul,
    .markdown ol,
    .markdown blockquote,
    .markdown pre,
    .markdown table {
      margin: 0 0 16px;
    }

    .markdown ul,
    .markdown ol {
      padding-left: 22px;
    }

    .markdown li + li {
      margin-top: 6px;
    }

    .markdown a {
      color: #8cc6ff;
      text-decoration: none;
    }

    .markdown a:hover {
      text-decoration: underline;
    }

    .markdown code {
      padding: 2px 6px;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.06);
      font-size: 0.92em;
    }

    .markdown pre {
      overflow: auto;
      padding: 18px;
      border-radius: var(--radius-sm);
      background: #0a1017;
      border: 1px solid rgba(173, 197, 255, 0.08);
    }

    .markdown pre code {
      padding: 0;
      background: transparent;
    }

    .markdown table {
      width: 100%;
      border-collapse: collapse;
      display: block;
      overflow: auto;
      border-radius: var(--radius-sm);
      border: 1px solid rgba(173, 197, 255, 0.08);
    }

    .markdown th,
    .markdown td {
      padding: 12px 14px;
      border-bottom: 1px solid rgba(173, 197, 255, 0.08);
      text-align: left;
      vertical-align: top;
    }

    .markdown th {
      background: rgba(255, 255, 255, 0.04);
      color: #dfeaff;
      font-size: 0.92rem;
    }

    .markdown blockquote {
      padding: 14px 18px;
      border-left: 3px solid #54a1ff;
      background: rgba(13, 97, 255, 0.08);
      border-radius: 0 12px 12px 0;
    }

    .markdown hr {
      border: 0;
      border-top: 1px solid rgba(173, 197, 255, 0.12);
      margin: 28px 0;
    }

    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .toc {
        position: static;
        max-height: none;
      }
    }

    @media (max-width: 640px) {
      .wrap,
      .nav-inner {
        width: min(calc(100% - 28px), var(--max-width));
      }

      .article-shell {
        padding: 24px 20px;
      }

      .nav-links {
        gap: 16px;
      }
    }
  </style>
</head>

        TzEL
      </a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="spec.html" class="active">Spec</a>
      </div>
    </div>
  </nav>

  <main class="wrap">
    <section class="layout">
      <aside class="toc">
        <div class="toc-title">Contents</div>
        __TOC__

      <div class="article-shell">
        <article class="markdown">

    </section>
  </main>
</body>
</html>
