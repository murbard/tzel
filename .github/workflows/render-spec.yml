name: Render Spec

on:
  push:
    branches:
      - main
    paths:
      - "specs/spec.md"
      - "docs/spec.template.html"
      - "docs/render_spec.py"
      - ".github/workflows/render-spec.yml"
  pull_request:
    paths:
      - "specs/spec.md"
      - "docs/spec.template.html"
      - "docs/render_spec.py"
      - ".github/workflows/render-spec.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install renderer dependency
        run: python -m pip install markdown==3.7

      - name: Render docs/spec.html
        run: python docs/render_spec.py

      - name: Verify rendered file on pull requests
        if: github.event_name == 'pull_request'
        run: git diff --exit-code -- docs/spec.html

      - name: Commit rendered file on main
        if: github.event_name == 'push'
        run: |
          if git diff --quiet -- docs/spec.html; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/spec.html
          git commit -m "Render spec page"
          git push
