name: site (landing page + whitepaper)

# Builds the site bundle: landing page (docs/index.html) plus a
# freshly-compiled whitepaper PDF (xelatex over docs/whitepaper.tex).
#
# Deploys to two targets:
#   1. GitHub Pages  — https://trilitech.github.io/tzel/
#   2. Amazon S3     — https://tzel.tezos.com (requires AWS_* secrets)
#
# Pages source is set to "GitHub Actions" (build_type = workflow).
# Rollback to legacy /docs deploy:
#
#   gh api repos/trilitech/tzel/pages -X PUT \
#     -f build_type=legacy \
#     -f source[branch]=main -f source[path]=/docs
#
# Only index.html and the generated whitepaper.pdf are published.
# Other docs/ files are reached via the repo browser on github.com.

on:
  push:
    branches: [main]
    paths:
      - "docs/index.html"
      - "docs/whitepaper.tex"
      - ".github/workflows/whitepaper.yml"
  pull_request:
    paths:
      - "docs/index.html"
      - "docs/whitepaper.tex"
      - ".github/workflows/whitepaper.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Pages-deploy concurrency: don't cancel an in-flight deploy with a
# fresher commit; let the running deploy finish first.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # Pinned to commit SHA rather than @v6 so a tag retag cannot
        # silently change what we run. Bump by re-resolving the v6
        # tag against the upstream actions/checkout repo.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install TeX Live (xelatex + latexmk + common packages)
        # Stock Ubuntu apt repos rather than a third-party LaTeX action,
        # so the dependency chain is just GitHub-maintained actions/*
        # plus apt. ~3-5 min install per cold run; transparent
        # provenance.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-xetex \
            texlive-fonts-recommended \
            texlive-latex-recommended \
            texlive-latex-extra \
            latexmk

      - name: Compile whitepaper with xelatex
        # Manual \begin{thebibliography} (no biber/biblatex), so two
        # xelatex passes resolve all citations. latexmk schedules them.
        working-directory: docs
        run: latexmk -xelatex -interaction=nonstopmode -halt-on-error whitepaper.tex

      - name: Stage Pages bundle
        # Two-file bundle: the landing page and the freshly-built PDF.
        # The rest of docs/ stays out of the published site — readers
        # reach those files via the public repo on github.com.
        run: |
          mkdir -p _site
          cp docs/index.html _site/index.html
          cp docs/whitepaper.pdf _site/whitepaper.pdf

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          path: _site

  deploy:
    # Only deploy on main pushes (and manual dispatches from main).
    # PRs from forks would not have the pages:write permission anyway,
    # but the explicit guard keeps the deploy job from running for
    # PR-build feedback.
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0

  deploy-s3:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment: production
    steps:
      - name: Download Pages artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: github-pages
          path: _site

      - name: Extract artifact
        run: tar -xf _site/artifact.tar -C _site && rm _site/artifact.tar

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ececac1a45f3b08a01d2dd070d28d111c5fe6722  # v4.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to S3
        run: aws s3 sync _site/ s3://${{ secrets.AWS_S3_BUCKET }}/ --delete

      - name: Invalidate CloudFront cache
        if: ${{ secrets.AWS_CLOUDFRONT_DISTRIBUTION_ID != '' }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.AWS_CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
